services:
  - type: worker
    name: telegram-scheduler-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: WEBHOOK_URL
        value: ""
      - key: PORT
        value: "8080"
      - key: DATA_DIR
        value: /data
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
